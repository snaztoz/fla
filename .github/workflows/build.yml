name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        build_type: [Release]
        compiler:
          - llvm-18
          - gcc-14
        include:
          - os: windows-latest
            build_type: Release
            compiler: msvc

    steps:
    - uses: actions/checkout@v6

    - name: Run clang-format style check.
      uses: jidicula/clang-format-action@v4.18.0
      with:
        clang-format-version: '22'
        check-path: '.'

    - name: Setup C++ compiler
      uses: aminya/setup-cpp@v1
      with:
        compiler: ${{ matrix.compiler }}

    - name: Set reusable strings
      # Turn these into environment variables for shorter commands
      id: strings
      shell: bash
      run: >
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake (Default)
      if: ${{ !(matrix.os == 'ubuntu-latest' && matrix.compiler == 'llvm-18') }}
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    # Use libc++ for this specific matrix
    - name: Configure CMake (Ubuntu-LLVM)
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.compiler == 'llvm-18' }}
      run: >
        sudo apt-get install -y libc++-18-dev libc++abi-18-dev
        && cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_CXX_FLAGS="-stdlib=libc++"
        -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++"
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      run: >
        cmake --build ${{ steps.strings.outputs.build-output-dir }}
        --config ${{ matrix.build_type }}

    - name: Test
      run: >
        ctest --test-dir ${{ steps.strings.outputs.build-output-dir }}
        -C ${{ matrix.build_type }} --output-on-failure
